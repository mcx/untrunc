name: release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FF_VER: "3.3.4"
      LIBUI_VER: "alpha4.1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - job: "32"
            untr_dest: untrunc_x32
            msystem: MINGW32
            arch: win32
            arch_ui: "386"
            sha_ffmpeg_dev: d5d48e0c24e4579230eb1a45e3589d27aceafd5391b044f3e6a24aa5d59c69eb
            sha_ffmpeg_shared: 40bb6ba68d8d1f586a8a69f4bda47f7b8bae1598dfcc6b90123be63e66fd7400
            sha_libui: e3d2e9a1862fa603d5d7b9d3ccb0692ba79f861bbe70030da32329d23e6fdbef
          - job: "64"
            untr_dest: untrunc_x64
            msystem: MINGW64
            arch: win64
            arch_ui: amd64
            sha_ffmpeg_dev: 9226dfe7f386d339f529bc2ba1be1022a44c829aeeadd2d905593d176c696feb
            sha_ffmpeg_shared: 4b2890ecf26130d2f11e5d9e25ccd008cbe8cbff633504729de24bf50f1e2c57
            sha_libui: f0d262959fd96ea5caeef188b56680f7f638e7b3d8a68575ff58e4000ae75109

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 / MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: false
          # install: literal package names (arch-independent, shared MSYS namespace)
          install: git zip unzip curl
          # pacboy: ':p' auto-prefixes with the active MSYSTEM (mingw-w64-i686-* / -x86_64-*)
          # ntldd: arch-aware PE dependency lister (ldd mis-resolves 32-bit exes)
          pacboy: gcc:p make:p ntldd:p

      - name: Download external artifacts
        run: |
          ff_base="https://web.archive.org/https://ffmpeg.zeranoe.com/builds"
          libui_base="https://github.com/andlabs/libui/releases/download/${LIBUI_VER}"

          curl -fsSL "${ff_base}/${{ matrix.arch }}/dev/ffmpeg-${FF_VER}-${{ matrix.arch }}-dev.zip"       -o ffmpeg-dev.zip
          curl -fsSL "${ff_base}/${{ matrix.arch }}/shared/ffmpeg-${FF_VER}-${{ matrix.arch }}-shared.zip" -o ffmpeg-shared.zip
          curl -fsSL "${libui_base}/libui-${LIBUI_VER}-windows-${{ matrix.arch_ui }}-mingw-static.zip"     -o libui-static.zip

      - name: Verify checksums (fail-fast)
        run: |
          cat > SHA256SUMS <<EOF
          ${{ matrix.sha_ffmpeg_dev }}  ffmpeg-dev.zip
          ${{ matrix.sha_ffmpeg_shared }}  ffmpeg-shared.zip
          ${{ matrix.sha_libui }}  libui-static.zip
          EOF
          sha256sum -c SHA256SUMS

      - name: Unpack into the MinGW sysroot
        run: |
          sysroot="$MINGW_PREFIX"   # /mingw64 or /mingw32, exported by MSYS2

          unzip -q ffmpeg-dev.zip
          cp -r ffmpeg-${FF_VER}-${{ matrix.arch }}-dev/include/* "${sysroot}/include/"
          cp -r ffmpeg-${FF_VER}-${{ matrix.arch }}-dev/lib/*     "${sysroot}/lib/"

          unzip -q ffmpeg-shared.zip
          cp -r ffmpeg-${FF_VER}-${{ matrix.arch }}-shared/bin/*  "${sysroot}/bin/"

          unzip -q -d libui-static libui-static.zip
          find libui-static -name '*.h' -exec cp {} "${sysroot}/include/" \;
          find libui-static -name '*.a' -exec cp {} "${sysroot}/lib/" \;

      - name: Build
        run: |
          mingw32-make IS_RELEASE=1
          mingw32-make untrunc-gui LIBUI_STATIC=1 IS_RELEASE=1

      - name: Bundle DLLs, strip and zip
        run: |
          dest="${{ matrix.untr_dest }}"
          mkdir -p "$dest"

          ntldd -R untrunc-gui.exe | awk '{print $1}' | sort -u | while read -r name; do
            src="$MINGW_PREFIX/bin/$name"
            [ -f "$src" ] || continue
            cp -v "$src" "$dest/$(basename "$name" | tr '[:lower:]' '[:upper:]')"
          done

          strip untrunc.exe     -o "$dest/untrunc.exe"
          strip untrunc-gui.exe -o "$dest/untrunc-gui.exe"
          zip -r "${dest}.zip" "$dest"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.untr_dest }}
          path: ${{ matrix.untr_dest }}.zip

  release:
    needs: [build-windows]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Collect all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish "latest" release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          assets=$(find dist -name '*.zip')
          commit_date=$(git log -1 --format=%cI "$GITHUB_SHA")
          notes="Automatic windows build by GitHub Actions.

          **Head:** ${GITHUB_SHA}
          **Date:** ${commit_date}"

          if gh release view latest >/dev/null 2>&1; then
            gh release edit latest \
              --title "Latest" \
              --notes "$notes"
            git tag -f latest "$GITHUB_SHA"
            git push -f origin refs/tags/latest
          else
            gh release create latest \
              --title "Latest" \
              --notes "$notes" \
              --target "$GITHUB_SHA"
          fi

          gh release upload latest $assets --clobber
